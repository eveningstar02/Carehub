name: carehub_app
description: Sanitary pad donation and distribution tracking with Isar and Supabase.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_riverpod: ^2.6.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  intl: ^0.20.2
  go_router: ^17.2.3
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.1.0
  url_launcher: ^6.1.10
  http: ^0.13.6
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/care_hub_logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.example
    - assets/images/care_hub_logo.png